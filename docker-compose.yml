version: "3.9"

services:
  client:
    build:
      context: ./

    ports:
      - "5173:4173"

    depends_on:
      - server

    environment:
      - VITE_API_URL=http://localhost:5000/api

  server:
    build:
      context: ./server

    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}

    restart: always